name: Deploy to Play Store

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:

  test:
    name: Microtests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Grand execute permissions to gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebug

  apk:
    name: Generate APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Allow gradlew execution
        run: chmod +x gradlew

      - name: Assemble app debug APK
        run: ./gradlew assembleDebug

      - name: Upload app APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Assemble app instrumentation tests
        run: ./gradlew assembleDebugAndroidTest

      - name: Upload app test APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-androidTest
          path: app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk



  firebase:
    name: Run UI tests with Firebase Test Lab
    needs: apk
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download app APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug

      - name: Download app test APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-androidTest

      - name: Authenticate Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.FIREWATCH_PROJECT_ID }}
          credentials_json: ${{ secrets.FIREBASE_AUTH }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Google Cloud auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_AUTH }}

      - name: Run instrumentation tests in Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app  /home/runner/work/firewatch-australia/firewatch-australia/app-debug.apk \
            --test  /home/runner/work/firewatch-australia/firewatch-australia/app-debug-androidTest.apk \
            --device model=shiba,version=34